[package]
name = "nudge"
# Cargo package metadata is not the release source of truth. Nudge ships as
# built GitHub release binaries, and the CLI version comes from git tags/build
# metadata via build.rs.
version = "0.1.0"
edition = "2024"
description = "Collaborative memory layer for Claude Code and Codex CLI agent hooks."
license = "Apache-2.0"
repository = "https://github.com/attunehq/nudge"
readme = "../../README.md"
keywords = ["agent", "hooks", "cli", "codex", "claude"]
categories = ["command-line-utilities", "development-tools"]

[dependencies]
bon = "3.8.1"
clap = { version = "4.5.53", features = ["env", "derive", "cargo"] }
color-eyre = "0.6.5"
color-print = "0.3.7"
directories = "6.0.0"
fastembed = { version = "5.16.1", default-features = false, features = ["hf-hub-rustls-tls", "ort-download-binaries-rustls-tls"], optional = true }
glob = "0.3.3"
monostate = "1.0.2"
regex = "1.12.2"
pulldown-cmark = "0.13.4"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = { version = "1.0.145", features = ["preserve_order"] }
serde_yaml = "0.9.34"
sha2 = "0.10.9"
shell-words = "1.1"
tap = "1.0.1"
tracing = "0.1.41"
tracing-error = "0.2.1"
tracing-subscriber = { version = "0.3.20", features = ["env-filter"] }
walkdir = "2.5.0"
annotate-snippets = "0.11"
tree-sitter = "0.25.10"
tree-sitter-rust = "0.24.0"
tree-sitter-typescript = "0.23.2"
tree-sitter-python = "0.25.0"
tree-sitter-javascript = "0.25.0"
tree-sitter-go = "0.25.0"
tree-sitter-java = "0.23.5"
tree-sitter-c-sharp = "0.23.1"
tree-sitter-kotlin-ng = "1.1.0"
tree-sitter-haskell = "0.23.1"
derive_more = { version = "2.1.0", features = ["full"] }
itertools = "0.14.0"
indoc = "2.0.7"
ignore = "0.4.25"

[dev-dependencies]
pretty_assertions = "1.4.1"
simple_test_case = "1.3.0"
tempfile = "3.20"
xshell = "0.2.7"

[features]
default = ["embeddings"]
embeddings = ["dep:fastembed"]

[lints]
workspace = true
