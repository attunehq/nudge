# Nudge rules for Rust code style enforcement.
#
# These rules demonstrate how to convert common Rust coding guidelines
# into Nudge rule definitions. Copy and adapt for your projects.

version: 1

rules:
  # Catch `use` statements inside function/closure bodies.
  # Uses tree-sitter to distinguish block-level imports from module-level imports.
  - name: no-inline-imports
    description: Move imports to the top of the file
    message: Move this `use` statement to the top of the file with other imports, then retry.
    on:
      - hook: PreToolUse
        tool: Write
        file: "**/*.rs"
        content:
          - kind: SyntaxTree
            language: rust
            query: |
              (block (use_declaration) @use)
      - hook: PreToolUse
        tool: Edit
        file: "**/*.rs"
        new_content:
          - kind: SyntaxTree
            language: rust
            query: |
              (block (use_declaration) @use)

  # Catch left-hand side type annotations in variable declarations.
  # Uses tree-sitter to match `let name: Type = ...` without false positives
  # from pattern matching like `let Value::Object(x) = ...`.
  - name: no-lhs-type-annotations
    description: Use type inference or turbofish instead of LHS annotations
    message: "Use turbofish syntax (e.g., `from_str::<Type>(...)`) or type inference instead of left-hand type annotations, then retry."
    on:
      - hook: PreToolUse
        tool: Write
        file: "**/*.rs"
        content:
          - kind: SyntaxTree
            language: rust
            query: |
              (let_declaration type: (_) @type)
      - hook: PreToolUse
        tool: Edit
        file: "**/*.rs"
        new_content:
          - kind: SyntaxTree
            language: rust
            query: |
              (let_declaration type: (_) @type)

  # Catch simple mutation-heavy Rust loops that have clear iterator
  # equivalents. The matcher intentionally skips complex loop bodies,
  # preallocated Vecs, unsafe contexts, and control-flow-heavy expressions.
  - name: prefer-functional-mutation
    description: Prefer iterator adapters over simple mutable Rust loops
    message: "{{ $suggestion }} Then retry."
    on:
      - hook: PreToolUse
        tool: Write
        file: "**/*.rs"
        content:
          - kind: RustFunctionalMutation
            patterns: [vec_push, find, fold]
      - hook: PreToolUse
        tool: Edit
        file: "**/*.rs"
        new_content:
          - kind: RustFunctionalMutation
            patterns: [vec_push, find, fold]

  # Catch unnecessarily fully qualified paths in code (not imports).
  # Pattern: paths with 2+ `::` separators followed by ::, (, or <
  - name: no-qualified-paths
    description: Simplify qualified paths by adding imports
    message: "Simplify this path by adding a `use` import at file top, then retry. Exception: keep qualified if it improves clarity."
    on:
      - hook: PreToolUse
        tool: Write
        file: "**/*.rs"
        content:
          - kind: Regex
            pattern: "std(::[a-zA-Z_][a-zA-Z0-9_]*){2,}(::|\\(|<)"
      - hook: PreToolUse
        tool: Edit
        file: "**/*.rs"
        new_content:
          - kind: Regex
            pattern: "std(::[a-zA-Z_][a-zA-Z0-9_]*){2,}(::|\\(|<)"

  # Suggest using `pretty_assertions` for better test output.
  # Uses tree-sitter to match the exact macro name, avoiding false positives
  # from `pretty_assert_eq!` which contains `assert_eq` as a substring.
  - name: prefer-pretty-assertions
    description: Use pretty_assertions in tests for better diff output
    message: "Use `pretty_assert_eq!` instead. Add `use pretty_assertions::assert_eq as pretty_assert_eq;` at file top, then retry."
    on:
      - hook: PreToolUse
        tool: Write
        file: "**/*.rs"
        content:
          - kind: SyntaxTree
            language: rust
            query: |
              (macro_invocation
                macro: (identifier) @macro
                (#eq? @macro "assert_eq"))
      - hook: PreToolUse
        tool: Edit
        file: "**/*.rs"
        new_content:
          - kind: SyntaxTree
            language: rust
            query: |
              (macro_invocation
                macro: (identifier) @macro
                (#eq? @macro "assert_eq"))

  # Catch guard clauses that check Option/Result state and then unwrap the same value.
  # Prefer `let-else` or match-style control flow so the invariant stays explicit.
  - name: prefer-let-else-over-check-unwrap
    description: Prefer let-else or match-style control flow over check-then-unwrap
    message: "Replace the {{ $check_method }} + unwrap guard for `{{ $receiver }}` with let-else or match-style control flow, then retry."
    on:
      - hook: PreToolUse
        tool: Write
        file: "**/*.rs"
        content:
          - kind: RustCheckThenUnwrap
      - hook: PreToolUse
        tool: Edit
        file: "**/*.rs"
        new_content:
          - kind: RustCheckThenUnwrap

  # Catch .unwrap() calls and suggest .expect() instead.
  # Uses tree-sitter to match actual method calls, avoiding false positives
  # from doc comments or string literals containing ".unwrap()".
  - name: no-unwrap
    description: Use .expect() instead of .unwrap() for better error messages
    message: 'Use `.expect("descriptive error message")` instead of `.unwrap()`, then retry.'
    on:
      - hook: PreToolUse
        tool: Write
        file: "**/*.rs"
        content:
          - kind: SyntaxTree
            language: rust
            query: |
              (call_expression
                function: (field_expression
                  field: (field_identifier) @method
                  (#eq? @method "unwrap"))
                arguments: (arguments))
      - hook: PreToolUse
        tool: Edit
        file: "**/*.rs"
        new_content:
          - kind: SyntaxTree
            language: rust
            query: |
              (call_expression
                function: (field_expression
                  field: (field_identifier) @method
                  (#eq? @method "unwrap"))
                arguments: (arguments))

  # Redirect docs.rs fetches to local cargo registry.
  # Demonstrates the WebFetch matcher with URL capture groups.
  - name: prefer-local-docs
    description: Read local crate source instead of fetching from docs.rs
    message: "{{ $suggestion }}"
    on:
      - hook: PreToolUse
        tool: WebFetch
        url:
          - kind: Regex
            pattern: "docs\\.rs/(?P<crate>[^/]+)"
            suggestion: "Don't fetch from docs.rs. Instead, read the local source at ~/.cargo/registry/src/*/{{ $crate }}-*"
